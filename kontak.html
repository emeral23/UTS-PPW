    <main>
        <section>
            <h2>Hubungi Kami</h2>
            <p>Punya pertanyaan atau ingin melakukan pemesanan? Silakan isi form di bawah ini:</p>
            
            <form action="#" method="POST">
                <table border="0" cellpadding="5">
                    <tr>
                        <td><label for="nama">Nama Lengkap:</label></td>
                        <td><input type="text" id="nama" name="nama" required placeholder="Masukkan nama lu"></td>
                    </tr>
                    <tr>
                        <td><label for="email">Email:</label></td>
                        <td><input type="email" id="email" name="email" required placeholder="nama@email.com"></td>
                    </tr>
                    <tr>
                        <td><label for="pesan">Pesan:</label></td>
                        <td><textarea id="pesan" name="pesan" rows="4" cols="30" required placeholder="Tulis pesan lu di sini..."></textarea></td>
                    </tr>
                    <tr>
                        <td></td>
                        <td>
                            <input type="submit" value="Kirim Pesan">
                            <input type="reset" value="Reset Form">
                        </td>
                    </tr>
                </table>
            </form>
        </section>
    </main>

    <hr>
    <footer>
        <p>UTS EMERALD ALIF NISTIAN</p>
    </footer>

</body>
